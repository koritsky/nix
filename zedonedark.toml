# Zed One Dark for Helix
# Ported from https://github.com/zed-industries/zed/blob/main/assets/themes/one/one.json

"attribute" = { fg = "blue" }
"comment" = { fg = "light-gray", modifiers = ["italic"] }
"comment.block.documentation" = { fg = "doc-gray", modifiers = ["italic"] }
"constant" = { fg = "yellow" }
"constant.numeric" = { fg = "orange" }
"constant.builtin" = { fg = "orange" }
"constant.builtin.boolean" = { fg = "orange" }
"constant.character.escape" = { fg = "doc-gray" }
"constructor" = { fg = "blue" }
"function" = { fg = "blue" }
"function.builtin" = { fg = "blue" }
"function.method" = { fg = "blue" }
"function.macro" = { fg = "blue" }
"keyword" = { fg = "purple" }
"keyword.operator" = { fg = "purple" }
"keyword.directive" = { fg = "purple" }
"label" = { fg = "blue" }
"namespace" = { fg = "white" }
"operator" = { fg = "cyan" }
"punctuation" = { fg = "ui-text" }
"punctuation.bracket" = { fg = "bracket" }
"punctuation.delimiter" = { fg = "bracket" }
"punctuation.special" = { fg = "punct-special" }
"special" = { fg = "ui-text" }
"string" = { fg = "green" }
"string.escape" = { fg = "doc-gray" }
"string.regexp" = { fg = "orange" }
"string.special" = { fg = "orange" }
"string.special.symbol" = { fg = "orange" }
"tag" = { fg = "blue" }
"type" = { fg = "cyan" }
"type.builtin" = { fg = "cyan" }
"type.enum.variant" = { fg = "blue" }
"variable" = { fg = "ui-text" }
"variable.builtin" = { fg = "orange" }
"variable.parameter" = { fg = "ui-text" }
"variable.other.member" = { fg = "red" }
"module" = { fg = "white" }

"markup.heading" = { fg = "red" }
"markup.raw.inline" = { fg = "green" }
"markup.bold" = { fg = "orange", modifiers = ["bold"] }
"markup.italic" = { fg = "blue", modifiers = ["italic"] }
"markup.strikethrough" = { modifiers = ["crossed_out"] }
"markup.list" = { fg = "red" }
"markup.quote" = { fg = "orange" }
"markup.link.url" = { fg = "cyan", modifiers = ["underlined"] }
"markup.link.text" = { fg = "blue" }

"diff.plus" = "green"
"diff.delta" = "yellow"
"diff.minus" = "red"

"diagnostic.info".underline = { color = "blue", style = "curl" }
"diagnostic.hint".underline = { color = "hint-blue", style = "curl" }
"diagnostic.warning".underline = { color = "yellow", style = "curl" }
"diagnostic.error".underline = { color = "red", style = "curl" }
"diagnostic.unnecessary" = { modifiers = ["dim"] }
"diagnostic.deprecated" = { modifiers = ["crossed_out"] }
"info" = { fg = "blue", modifiers = ["bold"] }
"hint" = { fg = "hint-blue", modifiers = ["bold"] }
"warning" = { fg = "yellow", modifiers = ["bold"] }
"error" = { fg = "red", modifiers = ["bold"] }

"ui.background" = { bg = "bg" }
"ui.gutter" = { bg = "bg" }
"ui.virtual" = { fg = "faint-gray" }
"ui.virtual.indent-guide" = { fg = "faint-gray" }
"ui.virtual.whitespace" = { fg = "light-gray" }
"ui.virtual.ruler" = { bg = "gray" }
"ui.virtual.inlay-hint" = { fg = "hint-blue", modifiers = ["bold"] }
"ui.virtual.jump-label" = { fg = "purple", modifiers = ["bold", "italic"] }

"ui.cursor" = { fg = "white", modifiers = ["reversed"] }
"ui.cursor.primary" = { fg = "white", modifiers = ["reversed"] }
"ui.cursor.match" = { fg = "blue", modifiers = ["underlined"] }

"ui.selection" = { bg = "faint-gray" }
"ui.selection.primary" = { bg = "#293b5b" }
"ui.cursorline.primary" = { bg = "gray" }

"ui.highlight" = { bg = "gray" }
"ui.highlight.frameline" = { bg = "#97202a" }

"ui.linenr" = { fg = "linenr" }
"ui.linenr.selected" = { fg = "linenr-active" }

"ui.statusline" = { fg = "white", bg = "surface" }
"ui.statusline.inactive" = { fg = "light-gray", bg = "black" }
"ui.statusline.normal" = { fg = "black", bg = "blue" }
"ui.statusline.insert" = { fg = "black", bg = "green" }
"ui.statusline.select" = { fg = "black", bg = "purple" }

"ui.text" = { fg = "ui-text" }
"ui.text.focus" = { fg = "white", bg = "gray", modifiers = ["bold"] }

"ui.help" = { fg = "white", bg = "gray" }
"ui.popup" = { bg = "gray" }
"ui.window" = { fg = "border" }
"ui.menu" = { fg = "ui-text", bg = "gray" }
"ui.menu.selected" = { fg = "bg", bg = "blue" }
"ui.menu.scroll" = { fg = "ui-text", bg = "light-gray" }

"ui.debug" = { fg = "red" }

[palette]
yellow = "#dfc184"
orange = "#bf956a"
blue = "#73ade9"
hint-blue = "#788ca6"
red = "#d07277"
purple = "#b477cf"
green = "#a1c181"
cyan = "#6eb4bf"
gray = "#2f343e"
light-gray = "#5d636f"
doc-gray = "#878e98"
faint-gray = "#3b4048"
linenr = "#4e5a5f"
linenr-active = "#d0d4da"
border = "#464b57"
bracket = "#b2b9c6"
punct-special = "#b1574b"
surface = "#3b414d"

white = "#dce0e5"
black = "#282c33"
bg = "#282c33"
ui-text = "#acb2be"
